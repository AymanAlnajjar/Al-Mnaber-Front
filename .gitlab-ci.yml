stages:
  - deploy

deploy_production:
  stage: deploy
  image: alpine:latest
  only:
    - main  # Triggers on push to main branch
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - echo -e "Host *\n\tStrictHostKeyChecking no\n" > ~/.ssh/config
  script:
    - ssh $SERVER_USER@$SERVER_IP "
        cd /var/www/almnaber-website &&
        git pull origin main &&
        npm ci &&
        npm run build &&
        pm2 restart almnaber-website --update-env &&
        echo 'Frontend deployment successful!'
      "
  environment:
    name: production
    url: https://almnaber.com
